body:
  text: 枕中經太清道真經上下三卷太上老君太素經枕中經老君曰大道無形常居杳冥隨機化物以應精誠子能寂念受吾眞經能受持者口淨身清然後誦之萬惡不生可以治病可以延齡百邪不忏羣魔束形所以然者一切有情受吾真炁及得長生今更於中固鍊身形恒淨三業澄止六情自然五神守護三一長存坐卧安穩魂魄康寧旦夕兩時三遍誦經耳聡目明身强體輕一如後文子當諦聽老君曰身中有三萬六千神左三魂右七魄身有千二百形影體有萬二千精光五臟六腑二十四神子常念之勿令離身有病三呼即降其真老君曰子欲過度三災九厄應作是言我以天爲父地爲母吾居其中常如赤子日爲功曹月爲主簿雷公使者在吾左右風伯雨師在吾前後六甲直符周帀圍繞青龍扶吾左白虎扶吾右朱雀導吾前玄武從吾後北斗覆吾頭天罡措吾足騰蛇在吾手爲吾滅殃咎吾居丹房中太一爲吾偶左三右七戴九履一二四爲吾肩六八爲吾足吾居中宫以爲腹實今勑千鬼萬神各還本鄉當吾者死背吾者亡速出奔迸隱匿深蔵天丁力士斬殺不祥急急如律令老君曰臨卧之時當出獸自衛其身青龍出吾肝在吾左白虎出吾肺在吾右朱雀出吾心在吾前玄武出吾腎在吾後汝等四獸磨牙利齒在吾左右前後辟却衆邪惡鬼逺去千里不得妄來干吾玉房令吾寢卧安穩無惡夢寐急急如律令老君曰都念即畢即當還神肝主蔵魂肺主蔵魄心主蔵神牌主蔵志腎主蔵精青龍還吾肝白虎還吾肺朱雀還吾心玄武還吾腎黄龍鎮吾脾以爲腹實衆邪惡鬼不得下居急急如律令老君曰還神旣畢即鳴天鼓三十六通咽液三十六過即閉氣從一至十心闇數之滿九便止當存赤氣從口中出狀如火光輪行四布周徧室中定即内想自然安寑其中常能如是永無疾病千妖萬魅莫之敢干與道合真長生乆視子孫昌樂富貴日興金車入門仕宦高遷禄位三公心忠志孝輔弼帝君急急如太上女青韶書律令枕中經
